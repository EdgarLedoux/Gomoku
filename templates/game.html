<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gomoku – {{ game_id }}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@400;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
  <div class="game-layout">

    <aside class="sidebar">
      <div style="display: flex; justify-content: space-between; align-items: flex-start;">
        <div>
          <div class="logo-kanji small">五目</div>
          <h1 class="game-title">GOMOKU</h1>
        </div>
        <div class="lang-switcher">
          <button id="lang-toggle-btn" class="btn btn-ghost" onclick="toggleLang()" style="font-size: 1.5rem; padding: 0.2rem 0.5rem; border-color: rgba(200,133,74,0.3);"></button>
        </div>
      </div>
      
      <div class="game-code-label">Partie <span class="mono">{{ game_id }}</span></div>

      <div class="player-info" id="my-info">
        <div class="stone-icon" id="my-stone"></div>
        <div>
          <div class="player-label" data-i18n="you_label">Vous</div>
          <div id="my-name-label" class="mono">–</div>
        </div>
      </div>

      <div class="player-info" id="opp-info">
        <div class="stone-icon" id="opp-stone"></div>
        <div>
          <div class="player-label" data-i18n="opp_label">Adversaire</div>
          <div id="opp-name-label" class="mono">–</div>
        </div>
      </div>

      <div id="status-box" class="status-box">
        <span id="status-text" data-i18n="status_connecting">Connexion…</span>
      </div>

      <div class="moves-title" data-i18n="history_label">Historique</div>
      <ol id="moves-list" class="moves-list"></ol>

      <button id="btn-resign" class="btn btn-danger" style="margin-top:auto" data-i18n="resign_btn">Abandonner</button>
    </aside>

    <main class="board-area">
      <canvas id="board-canvas"></canvas>
      <div id="overlay" class="overlay hidden">
        <div class="overlay-content">
          <div id="overlay-title"></div>
          <div class="overlay-buttons">
            <button id="btn-rematch" class="btn btn-primary" data-i18n="rematch_btn">Rejouer ↺</button>
            <button class="btn btn-ghost" onclick="window.location.href='/'" data-i18n="home_btn">← Accueil</button>
          </div>
          <div id="rematch-status" class="waiting-msg hidden" data-i18n="waiting_rematch">⏳ En attente de l'adversaire…</div>
        </div>
      </div>
    </main>

  </div>

  <script src="/static/js/i18n.js"></script>
  <script src="/static/js/game.js"></script>
  <script>
    const GAME_ID  = "{{ game_id }}";
    const PLAYER_ID = new URLSearchParams(window.location.search).get("player_id");
    initGame(GAME_ID, PLAYER_ID);
  </script>
</body>
</html>
